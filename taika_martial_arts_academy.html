<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taika Martial Arts Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0392B;--red2:#922B21;--red-bg:#fdf0ef;
  --gold:#D4AC0D;--gold-bg:#fef9e7;
  --black:#111;--dark:#1c1c1e;
  --gray:#6b7280;--gray2:#9ca3af;--border:#e5e7eb;--bg:#f4f4f6;
  --font-h:"Oswald",sans-serif;--font-b:"DM Sans",sans-serif;
  --radius:12px;--shadow:0 2px 16px rgba(0,0,0,.07);--sidebar:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--bg);color:var(--black);display:flex;min-height:100vh}
#sidebar{width:var(--sidebar);min-height:100vh;background:var(--dark);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .3s}
.logo-wrap{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.logo-wrap img{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0}
.logo-text .name{font-family:var(--font-h);font-size:13px;font-weight:600;color:#fff;line-height:1.2}
.logo-text .sub{font-size:10px;color:var(--gray2);margin-top:2px}
nav{flex:1;padding:14px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:rgba(255,255,255,.55);cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:rgba(192,57,43,.18);color:#fff;border-left-color:var(--red)}
.nav-item .ico{font-size:18px;width:22px;text-align:center}
.nb{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;margin-left:auto}
.sf{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);font-size:11px}
#main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#topbar .pt{font-family:var(--font-h);font-size:20px;font-weight:600;letter-spacing:.5px}
.tbr{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;font-family:var(--font-b)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red2)}
.btn-out{background:#fff;color:var(--black);border:1px solid var(--border)}.btn-out:hover{background:var(--bg)}
.btn-ghost{background:transparent;color:var(--gray)}.btn-ghost:hover{background:var(--bg)}
#content{padding:22px 24px;flex:1}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.sc{background:#fff;border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.sc .lbl{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.sc .val{font-family:var(--font-h);font-size:28px;font-weight:700;margin:5px 0 3px}
.sc .sub{font-size:12px;color:var(--gray2)}
.sc.red .val{color:var(--red)}.sc.grn .val{color:#16a34a}.sc.gld .val{color:var(--gold)}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.ch{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ch h3{font-family:var(--font-h);font-size:16px;font-weight:600}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:#f9fafb;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);font-weight:600;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border)}
.tbl td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.tbl tr:hover td{background:#fafafa}
.tbl tr:last-child td{border-bottom:none}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:#dcfce7;color:#16a34a}.br{background:#fee2e2;color:#dc2626}
.ba{background:#fef9c3;color:#b45309}.bb{background:#dbeafe;color:#2563eb}.bgr{background:#f3f4f6;color:#6b7280}
.belt{display:inline-block;width:13px;height:13px;border-radius:3px;margin-right:5px;vertical-align:middle;border:1px solid rgba(0,0,0,.12)}
.sw{position:relative}.sw input{padding:8px 10px 8px 32px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:210px;outline:none;font-family:var(--font-b)}
.sw input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.1)}
.sw .sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--gray2);font-size:14px}
.att-wrap{overflow-x:auto;padding:12px}
.att-row{display:flex;align-items:center;gap:3px;margin-bottom:3px}
.att-nm{width:150px;font-size:12px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding-right:6px;flex-shrink:0}
.adb{width:26px;height:26px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;flex-shrink:0}
.ap{background:#dcfce7;color:#16a34a}.aa{background:#fee2e2;color:#dc2626}
.af{background:#f9fafb;color:#d1d5db;cursor:not-allowed}
.ao{background:#f3f4f6;color:#9ca3af}
.cbw{display:flex;flex-direction:column;gap:9px}
.crow{display:flex;align-items:center;gap:8px;font-size:13px}
.crow .mo{width:68px;color:var(--gray);font-size:12px}
.crow .bb2{flex:1;background:#f3f4f6;border-radius:4px;height:20px;overflow:hidden;position:relative}
.crow .bf{height:100%;border-radius:4px;transition:width .5s}
.crow .bl{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.crow .am{width:90px;text-align:right;font-weight:600;font-size:12px}
.wab{background:#25D366;color:#fff;border:none;border-radius:5px;padding:4px 9px;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;text-decoration:none}
.wab:hover{background:#1ebe5d}
#np{position:fixed;right:0;top:0;bottom:0;width:350px;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.1);z-index:200;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column}
#np.open{transform:translateX(0)}
.nph{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.nph h3{font-family:var(--font-h);font-size:16px}
.npl{flex:1;overflow-y:auto;padding:10px}
.ni{background:var(--bg);border-radius:8px;padding:11px;margin-bottom:7px;font-size:13px}
.ni .nt{font-weight:600;margin-bottom:3px}
.ni .nm{color:var(--gray);font-size:12px;line-height:1.4;margin-bottom:7px}
.mo2{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center}
.mo2.open{display:flex}
.mod{background:#fff;border-radius:16px;padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.mod h3{font-family:var(--font-h);font-size:18px;margin-bottom:18px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgi{display:flex;flex-direction:column;gap:5px}
.fgi label{font-size:12px;font-weight:500;color:var(--gray)}
.fgi input,.fgi select{padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font-b);outline:none}
.fgi input:focus,.fgi select:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.08)}
.ff{grid-column:1/-1}
.ma{margin-top:18px;display:flex;gap:8px;justify-content:flex-end}
#hb{display:none;background:none;border:none;font-size:22px;cursor:pointer;padding:0 4px}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}#hb{display:block}
  #ov.show{display:block}
  .sg{grid-template-columns:1fr 1fr}
  #content{padding:14px}
  .sw input{width:150px}
}
</style>
</head>

function statB(s){if(isUp(s))return "<span class='bdg br'>Overdue</span>";const d=dud(s);if(d<=5)return "<span class='bdg ba'>Due in "+d+"d</span>";return "<span class='bdg bg'>Paid</span>";}
function wa(ph,msg,lbl){const u="https://wa.me/91"+ph+"?text="+encodeURIComponent(msg);return "<a href='"+u+"' target='_blank' class='wab'>📱 "+lbl+"</a>";}
function getNots(){const n=[];const ym=tod().slice(0,7);students.forEach(s=>{const ab=absCnt(s.id,ym);if(ab>=2&&ab<5)n.push({t:"a2",s,ab});if(ab>=5)n.push({t:"a5",s,ab});const d=dud(s);if(d>=0&&d<=5)n.push({t:"due",s,d});});return n;}
function updBadges(){document.getElementById("ub").textContent=students.filter(s=>isUp(s)).length;document.getElementById("nc").textContent=getNots().length;}
function showPage(p){
  curPage=p;
  document.querySelectorAll(".nav-item").forEach((el,i)=>{const ps=["dashboard","students","fees","attendance","expenses","enquiries",""];el.classList.toggle("active",ps[i]===p);});
  const titles={dashboard:"Dashboard",students:"Students",fees:"Fee Management",attendance:"Attendance",expenses:"Expenses & P&L",enquiries:"Enquiries"};
  document.getElementById("pt").textContent=titles[p]||"";
  const acts={dashboard:"+ Add Student",students:"+ Add Student",fees:"+ Record Payment",attendance:"Mark Today",expenses:"+ Add Expense",enquiries:"+ Add Enquiry"};
  document.getElementById("ta").textContent=acts[p]||"";
  document.getElementById("ta").onclick={dashboard:openAS,students:openAS,fees:()=>openFee(null),attendance:()=>markAll(attMo),expenses:openAE,enquiries:openAQ}[p]||openAS;
  updBadges();render();closeSB();
}
function render(){const fns={dashboard:rDash,students:rStud,fees:rFees,attendance:rAtt,expenses:rExp,enquiries:rEnq};if(fns[curPage])document.getElementById("content").innerHTML=fns[curPage]();}
function onSrch(v){srch=v;if(curPage==="students")render();}

function rDash(){
  if(!students||students.length===0){return "<div style='padding:40px;text-align:center'><div style='font-size:48px;margin-bottom:12px'>🥋</div><div style='font-size:16px;font-weight:600;color:#1c1c1e;margin-bottom:8px'>Welcome to Taika Martial Arts Academy</div><div style='font-size:13px;color:#6b7280;margin-bottom:20px'>Your data is loading from Google Sheets...</div><button class='btn btn-red' onclick='loadFromSheets()'>🔄 Load Data from Sheets</button></div>";}
  const paid=students.filter(s=>!isUp(s)).length;
  const unp=students.filter(s=>isUp(s)).length;
  const tDue=students.filter(s=>isUp(s)).reduce((a,s)=>a+(s.fee||0),0);
  const maxA=monthly.length?Math.max(...monthly.map(m=>Math.max(m.collected,m.expenses))):1;
  let mRows=monthly.map(m=>{
    const wc=Math.round(m.collected/maxA*100);const we=Math.round(m.expenses/maxA*100);
    return "<div class='crow' style='margin-bottom:10px'><span class='mo'>"+m.month+"</span><div style='flex:1'><div class='crow' style='margin-bottom:2px'><span style='width:58px;font-size:11px;color:var(--gray)'>Collected</span><div class='bb2'><div class='bf' style='width:"+wc+"%;background:var(--red)'><span class='bl'>"+fmt(m.collected)+"</span></div></div></div><div class='crow'><span style='width:58px;font-size:11px;color:var(--gray)'>Expenses</span><div class='bb2'><div class='bf' style='width:"+we+"%;background:#94a3b8'><span class='bl'>"+fmt(m.expenses)+"</span></div></div></div></div><span class='am' style='color:"+(m.remains>0?"#16a34a":"var(--red)")+"'>"+fmt(m.remains)+"</span></div>";
  }).join("");
  const rec=students.filter(s=>s.joinedDate).sort((a,b)=>b.joinedDate.localeCompare(a.joinedDate)).slice(0,6);
  const rRows=rec.map(s=>"<tr><td><b>"+s.name+"</b></td><td>"+beltB(s.belt)+"</td><td>"+(s.joinedDate||"-")+"</td><td>"+statB(s)+"</td></tr>").join("");
  return "<div class='sg'><div class='sc'><div class='lbl'>Total Students</div><div class='val'>"+students.length+"</div><div class='sub'>Active members</div></div><div class='sc grn'><div class='lbl'>Fee Paid</div><div class='val'>"+paid+"</div><div class='sub'>"+Math.round(paid/students.length*100)+"% of batch</div></div><div class='sc red'><div class='lbl'>Overdue</div><div class='val'>"+unp+"</div><div class='sub'>"+fmt(tDue)+" pending</div></div><div class='sc gld'><div class='lbl'>Total Collected</div><div class='val'>"+fmt(monthly.reduce((a,m)=>a+m.collected,0))+"</div><div class='sub'>Nov 2025–Mar 2026</div></div></div><div style='display:grid;grid-template-columns:1fr 1fr;gap:18px'><div class='card'><div class='ch'><h3>Monthly P&L</h3></div><div style='padding:14px 18px'><div class='cbw'>"+mRows+"</div></div></div><div class='card'><div class='ch'><h3>Recently Joined</h3></div><table class='tbl'><thead><tr><th>Name</th><th>Belt</th><th>Joined</th><th>Status</th></tr></thead><tbody>"+rRows+"</tbody></table></div></div>";
}

function rStud(){
  const fil=students.filter(s=>!srch||s.name.toLowerCase().includes(srch.toLowerCase())||s.phone.includes(srch));
  let rows="";

  });

function rFees(){

function rAtt(){
  const ym=attMo;const [yr,mo]=ym.split("-").map(Number);const dim=new Date(yr,mo,0).getDate();
  const rec=att[ym]||{};
  const todStr=tod();
  let hdr="<div class='att-row' style='margin-bottom:4px'><div class='att-nm' style='font-size:10px;color:var(--gray);font-weight:600'>Student</div>";
  for(let d=1;d<=dim;d++)hdr+="<div style='width:26px;text-align:center;font-size:10px;color:var(--gray);font-weight:600;flex-shrink:0'>"+d+"</div>";
  hdr+="</div>";
  const rows=students.map(s=>{
    const sr=rec[s.id]||{};
    let cells="";
    for(let d=1;d<=dim;d++){
      const ds=ym+"-"+String(d).padStart(2,"0");
      const v=sr[d]||"";

      else{const cl=v==="P"?"ap":v==="A"?"aa":"ao";cells+="<button class='adb "+cl+"' onclick='tAtt(""+s.id+"","+d+",""+ym+"")'>"+( v||"·")+"</button>";}
    }
    const ab=Object.values(sr).filter(v=>v==="A").length;
    return "<div class='att-row'><div class='att-nm'>"+s.name+(ab>0?"<span class='bdg br' style='margin-left:3px;padding:1px 4px;font-size:9px'>"+ab+"A</span>":"")+"</div>"+cells+"</div>";
  }).join("");

  const sel=mos.map(m=>"<option value='"+m+"'"+(m===ym?" selected":"")+">"+m+"</option>").join("");
  return "<div style='display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap'><select onchange='attMo=this.value;render()' style='padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px'>"+sel+"</select><button class='btn btn-red' onclick='markAll(""+ym+"")'>✓ All Present</button><button class='btn btn-out' onclick='alert("Today marked as holiday")'>🏖 Holiday</button><span style='font-size:12px;color:var(--gray)'>"+students.length+" students · "+dim+" days</span></div><div class='card'><div class='ch'><h3>Attendance — "+ym+"</h3><span class='bdg bb'>Tap P/A to toggle</span></div><div class='att-wrap'>"+hdr+rows+"</div></div>";
}
function tAtt(sid,day,ym){
  if(!att[ym])att[ym]={};if(!att[ym][sid])att[ym][sid]={};
  const c=att[ym][sid][day]||"";att[ym][sid][day]=c==="P"?"A":c==="A"?"":"P";
  sv();render();updBadges();
  const ds2=ym+"-"+String(day).padStart(2,"0");
  const stud=students.find(x=>x.id===sid);
  api("markAttendance",{records:[{studentId:sid,studentName:stud?stud.name:"",date:ds2,month:ym,status:att[ym][sid][day]||""}],recordedBy:""});
}
function markAll(ym){
  if(!att[ym])att[ym]={};
  const d=parseInt(tod().slice(8));
  students.forEach(s=>{if(!att[ym][s.id])att[ym][s.id]={};att[ym][s.id][d]="P";});
  sv();render();
}

function rExp(){
  const cats={"Rent":0,"Salary":0,"Electricity":0,"Marketing":0,"Housekeeping":0,"Others":0};
  exps.forEach(e=>{if(!e.expense)return;const d=e.detail.toLowerCase();if(d.includes("rent"))cats["Rent"]+=e.expense;else if(d.includes("salary")||d.includes("master"))cats["Salary"]+=e.expense;else if(d.includes("electr"))cats["Electricity"]+=e.expense;else if(d.includes("pamplet")||d.includes("flex")||d.includes("sticker")||d.includes("print"))cats["Marketing"]+=e.expense;else if(d.includes("house")||d.includes("clean"))cats["Housekeeping"]+=e.expense;else cats["Others"]+=e.expense;});
  const tot=Object.values(cats).reduce((a,b)=>a+b,0);
  const cc={"Rent":"#C0392B","Salary":"#2563eb","Electricity":"#d97706","Marketing":"#7c3aed","Housekeeping":"#059669","Others":"#6b7280"};
  const cR=Object.entries(cats).map(([k,v])=>{const p=tot?Math.round(v/tot*100):0;return "<div class='crow'><span class='mo'>"+k+"</span><div class='bb2'><div class='bf' style='width:"+p+"%;background:"+cc[k]+"'><span class='bl'>"+p+"%</span></div></div><span class='am'>"+fmt(v)+"</span></div>";}).join("");
  const eR=[...exps].reverse().slice(0,30).map(e=>"<tr><td>"+(e.date||"-")+"</td><td>"+e.detail+"</td><td style='color:#16a34a'>"+(e.credit?fmt(e.credit):"-")+"</td><td style='color:var(--red)'>"+(e.expense?fmt(e.expense):"-")+"</td><td>"+(e.paidBy||"-")+"</td></tr>").join("");
  return "<div style='display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px'><div class='sc grn'><div class='lbl'>Total Collected (6 mo)</div><div class='val'>"+fmt(monthly.reduce((a,m)=>a+m.collected,0))+"</div></div><div class='sc red'><div class='lbl'>Total Expenses</div><div class='val'>"+fmt(tot)+"</div></div></div><div style='display:grid;grid-template-columns:1fr 1fr;gap:18px'><div class='card'><div class='ch'><h3>Expense Breakdown</h3></div><div style='padding:14px 18px'><div class='cbw'>"+cR+"</div></div></div><div class='card'><div class='ch'><h3>Expense Log</h3><button class='btn btn-red' style='font-size:12px;padding:4px 9px' onclick='openAE()'>+ Add</button></div><div style='max-height:380px;overflow-y:auto'><table class='tbl'><thead><tr><th>Date</th><th>Details</th><th>Credit</th><th>Expense</th><th>By</th></tr></thead><tbody>"+eR+"</tbody></table></div></div></div>";
}

function rEnq(){
  const sc={"New":"bb","Contacted":"ba","Joined":"bg","Lost":"br"};
  const rows=enqs.map((e,i)=>"<tr><td><b>"+e.name+"</b></td><td>"+e.phone+"</td><td>"+e.date+"</td><td>"+(e.source||"-")+"</td><td><span class='bdg "+sc[e.status]+"'>" +e.status+"</span></td><td>"+wa(e.phone,"Hi "+e.name+", thank you for your interest in Taika Martial Arts Academy! We would love to have you join us. 🥋","WA")+" <select onchange='updEnq("+i+",this.value)' style='padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:11px'>"+["New","Contacted","Joined","Lost"].map(s=>"<option "+(s===e.status?"selected":"")+">"+s+"</option>").join("")+"</select></td></tr>").join("")||"<tr><td colspan=6 style='text-align:center;color:var(--gray);padding:18px'>No enquiries yet</td></tr>";
  const stat=["New","Contacted","Joined","Lost"];
  return "<div class='sg'>"+stat.map(s=>"<div class='sc'><div class='lbl'>"+s+"</div><div class='val'>"+enqs.filter(e=>e.status===s).length+"</div></div>").join("")+"</div><div class='card'><div class='ch'><h3>Enquiry Pipeline</h3></div><div style='overflow-x:auto'><table class='tbl'><thead><tr><th>Name</th><th>Phone</th><th>Date</th><th>Source</th><th>Status</th><th>Actions</th></tr></thead><tbody>"+rows+"</tbody></table></div></div>";

function updEnq(i,v){enqs[i].status=v;sv();render();}

function openAS(){document.getElementById("ms").classList.add("open");}
function closeM(id){document.getElementById(id).classList.remove("open");}

function openFee(sid){

  document.getElementById("fpp").value=s?s.plan:"1 Month";

  const pl=document.getElementById("fpp").value;const dt=document.getElementById("fpd").value;if(!dt)return;

document.getElementById("fpp").addEventListener("change",calcVT);

  if(curFS){const s=curFS;const msg="Hi "+s.parentName+", payment of Rs"+amt+" for "+s.name+" at Taika Martial Arts Academy received on "+dt+". Valid till "+vt+". Thank you!";if(confirm("Payment saved! Send WhatsApp receipt?"))window.open("https://wa.me/91"+s.phone+"?text="+encodeURIComponent(msg),"_blank");}

function openAE(){const det=prompt("Expense detail:");if(!det)return;const amt=parseFloat(prompt("Amount (Rs):"));if(!amt)return;const by=prompt("Paid by:");const exp={date:tod(),detail:det,expense:amt,credit:0,paidBy:by||""};exps.unshift(exp);sv();render();
  api("addExpense",exp).then(r=>{if(r&&r.ok)showToast("Expense saved to Sheets!");});}
function openAQ(){const name=prompt("Name:");if(!name)return;const phone=prompt("Phone:");if(!phone)return;const src=prompt("Source (Referral/Pamphlet/Walk-in):");const enq={name,phone,date:tod(),source:src||"Walk-in",status:"New"};enqs.push(enq);sv();render();
  api("addEnquiry",enq).then(r=>{if(r&&r.ok)showToast("Enquiry saved to Sheets!");});}
function toggleNP(){
  const nots=getNots();let h="";
  if(!nots.length)h="<p style='color:var(--gray);font-size:13px;padding:8px'>No pending notifications</p>";
  nots.forEach(n=>{let t="",m="",b="";if(n.t==="a2"){t="Absent Alert — "+n.s.name;m=n.s.name+" absent "+n.ab+" days this month";b=wa(n.s.phone,"Hi, "+n.s.name+" has been absent "+n.ab+" days this month at Taika MA. Please ensure attendance.","Send Alert");}else if(n.t==="a5"){t="High Absence — "+n.s.name;m=n.s.name+" absent "+n.ab+" days!";b=wa(n.s.phone,"Hi, "+n.s.name+" has been absent "+n.ab+" days this month. Please contact us.","Send Alert");}else if(n.t==="due"){t="Fee Due — "+n.s.name;m="Expires in "+n.d+" days ("+n.s.validTill+")";b=wa(n.s.phone,"Hi, fees for "+n.s.name+" are due in "+n.d+" days. Kindly renew. - Taika MA","Send Reminder");}h+="<div class='ni'><div class='nt'>"+t+"</div><div class='nm'>"+m+"</div>"+b+"</div>";});
  document.getElementById("npl").innerHTML=h;document.getElementById("np").classList.toggle("open");
}
function toggleSB(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("ov").classList.toggle("show");}
function closeSB(){document.getElementById("sidebar").classList.remove("open");document.getElementById("ov").classList.remove("show");}

async function testConnection(){
  showToast("Testing connection...",true);
  const r=await apiGet("ping");
  if(r&&r.ok)showToast("Connected to Google Sheets! "+r.time.slice(0,10));
  else showToast("Connection failed — check Apps Script URL",false);
}
async function loadFromSheets(){
  showToast("Loading from Google Sheets...",true);
  try{
    const [ss,ff,ee,qq]=await Promise.all([
      apiGet("getStudents"),apiGet("getFees"),apiGet("getExpenses"),apiGet("getEnquiries")
    ]);
    if(ss&&Array.isArray(ss)&&ss.length>0){students=ss;showToast("Synced "+ss.length+" students from Sheets!");}
    if(ff&&Array.isArray(ff)){fees=ff;}
    if(ee&&Array.isArray(ee)){exps=ee;}
    if(qq&&Array.isArray(qq)){enqs=qq;}
    sv();updBadges();render();
  }catch(e){showToast("Sync failed: "+e.message,false);}
}
async function seedToSheets(){
  showToast("Seeding "+students.length+" students to Sheets...",true);
  let ok=0;
  for(const s of students){
    const r=await api("addStudent",s);
    if(r&&r.ok)ok++;
  }
  showToast("Seeded "+ok+" students to Google Sheets!");
}

// ── AUTO INIT ─────────────────────────────────────────────────
async function init() {
  // First render with local data (instant)
  updBadges();
  render();
  
  // Then try to connect and load from Sheets
  try {
    const u = new URL(API);
    u.searchParams.set("action","ping");
    const r = await fetch(u, {mode:"cors"});
    const j = await r.json();
    if (j && j.ok) {
      showToast("Connected! Loading data from Sheets...", true);
      await loadFromSheets();
    }
  } catch(e) {
    // Sheets unavailable — use local data silently
    console.log("Sheets not available, using local data");
  }
}

// Fix rDash to handle empty students gracefully
const _origRender = render;

// Override render to catch errors
function safeRender() {
  try { _origRender(); } catch(e) {
    document.getElementById("content").innerHTML = 
      "<div style='padding:40px;text-align:center;color:var(--gray)'>" +
      "<div style='font-size:48px;margin-bottom:16px'>🥋</div>" +
      "<div style='font-size:18px;font-weight:600;margin-bottom:8px'>Loading data...</div>" +
      "<div style='font-size:13px'>Click <b>Sync from Sheets</b> in the sidebar to load your data.</div></div>";
    console.error("Render error:", e);
  }
}

init();
</script>
