<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Taika Martial Arts Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--red:#C0392B;--red2:#922B21;--gold:#D4AC0D;--black:#111;--dark:#1c1c1e;--gray:#6b7280;--gray2:#9ca3af;--border:#e5e7eb;--bg:#f4f4f6;--fh:"Oswald",sans-serif;--fb:"DM Sans",sans-serif;--r:12px;--sh:0 2px 16px rgba(0,0,0,.07);--sb:240px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--black);display:flex;min-height:100vh}
#sb{width:var(--sb);min-height:100vh;background:var(--dark);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .3s}
.lw{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.lw img{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0}
.lt .n{font-family:var(--fh);font-size:13px;font-weight:600;color:#fff;line-height:1.2}
.lt .s{font-size:10px;color:var(--gray2);margin-top:2px}
nav{flex:1;padding:14px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:11px 20px;color:rgba(255,255,255,.55);cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;border-left:3px solid transparent}
.ni:hover{background:rgba(255,255,255,.05);color:#fff}
.ni.active{background:rgba(192,57,43,.18);color:#fff;border-left-color:var(--red)}
.ico{font-size:18px;width:22px;text-align:center}
.nb{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;margin-left:auto}
.sf{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:6px}
.sf span{color:rgba(255,255,255,.4);font-size:11px}
.sbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:var(--fb);width:100%;text-align:left;transition:all .2s}
.sbtn:hover{background:rgba(255,255,255,.2)}
.sbtn:disabled{opacity:.5;cursor:not-allowed}
#mn{margin-left:var(--sb);flex:1;display:flex;flex-direction:column}
#tb{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#tb .pt{font-family:var(--fh);font-size:20px;font-weight:600;letter-spacing:.5px}
.tr{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;font-family:var(--fb)}
.btr{background:var(--red);color:#fff}.btr:hover{background:var(--red2)}
.bto{background:#fff;color:var(--black);border:1px solid var(--border)}.bto:hover{background:var(--bg)}
.btg{background:transparent;color:var(--gray)}.btg:hover{background:var(--bg)}
#ct{padding:22px 24px;flex:1}
.sg5{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:22px}
.sc{background:#fff;border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh)}
.sc .lb{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.sc .vl{font-family:var(--fh);font-size:26px;font-weight:700;margin:5px 0 3px}
.sc .sb2{font-size:12px;color:var(--gray2)}
.sc.rd .vl{color:var(--red)}.sc.gn .vl{color:#16a34a}.sc.gd .vl{color:var(--gold)}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.ch{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ch h3{font-family:var(--fh);font-size:16px;font-weight:600}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:#f9fafb;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);font-weight:600;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border)}
.tbl td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.tbl tr:hover td{background:#fafafa}
.tbl tr:last-child td{border-bottom:none}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:#dcfce7;color:#16a34a}.br2{background:#fee2e2;color:#dc2626}
.ba{background:#fef9c3;color:#b45309}.bb{background:#dbeafe;color:#2563eb}
.belt{display:inline-block;width:13px;height:13px;border-radius:3px;margin-right:5px;vertical-align:middle;border:1px solid rgba(0,0,0,.12)}
.sw{position:relative}.sw input{padding:8px 10px 8px 32px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:220px;outline:none;font-family:var(--fb)}
.sw input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.1)}
.sw .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--gray2);font-size:14px}
.aw{overflow-x:auto;padding:12px}
.ar{display:flex;align-items:center;gap:3px;margin-bottom:3px}
.anm{width:150px;font-size:12px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding-right:6px;flex-shrink:0}
.adb{width:26px;height:26px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;flex-shrink:0}
.ap{background:#dcfce7;color:#16a34a}.aa{background:#fee2e2;color:#dc2626}
.af{background:#f9fafb;color:#d1d5db;cursor:not-allowed}.ao{background:#f3f4f6;color:#9ca3af}
.cw{display:flex;flex-direction:column;gap:10px}
.cr{display:flex;align-items:center;gap:8px}
.cr .mo{width:68px;color:var(--gray);font-size:12px;flex-shrink:0}
.cr .bb2{flex:1;background:#f3f4f6;border-radius:4px;height:18px;overflow:hidden}
.cr .bf{height:100%;border-radius:4px;transition:width .5s;min-width:4px}
.cr .bamt{font-size:11px;font-weight:600;width:95px;text-align:right;flex-shrink:0}
.cr .rem{width:85px;text-align:right;font-weight:600;font-size:12px;flex-shrink:0}
.wa{background:#25D366;color:#fff;border:none;border-radius:5px;padding:4px 9px;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;text-decoration:none;font-family:var(--fb)}
.wa:hover{background:#1ebe5d}
#np{position:fixed;right:0;top:0;bottom:0;width:360px;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.1);z-index:200;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column}
#np.open{transform:translateX(0)}
.nph{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.nph h3{font-family:var(--fh);font-size:16px}
.npl{flex:1;overflow-y:auto;padding:10px}
.nit{background:var(--bg);border-radius:8px;padding:11px;margin-bottom:7px;font-size:13px}
.nit .nt{font-weight:600;margin-bottom:3px}.nit .nm{color:var(--gray);font-size:12px;line-height:1.4;margin-bottom:7px}
.mo2{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center}
.mo2.open{display:flex}
.mod{background:#fff;border-radius:16px;padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.mod h3{font-family:var(--fh);font-size:18px;margin-bottom:18px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgi{display:flex;flex-direction:column;gap:5px}
.fgi label{font-size:12px;font-weight:500;color:var(--gray)}
.fgi input,.fgi select{padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--fb);outline:none}
.fgi input:focus,.fgi select:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.08)}
.ff{grid-column:1/-1}.ma{margin-top:18px;display:flex;gap:8px;justify-content:flex-end}
#hb{display:none;background:none;border:none;font-size:22px;cursor:pointer;padding:0 4px}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 24px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;transition:opacity .4s;font-family:"DM Sans",sans-serif;opacity:0;pointer-events:none;max-width:90vw;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){#sb{transform:translateX(-100%)}#sb.open{transform:translateX(0)}#mn{margin-left:0}#hb{display:block}#ov.show{display:block}.sg5{grid-template-columns:1fr 1fr}#ct{padding:14px}.sw input{width:150px}}
</style>
</head>

function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.innerHTML = msg;
  t.style.background = type === "error" ? "#C0392B" : type === "warn" ? "#d97706" : "#16a34a";
  t.style.color = "#fff";
  t.style.opacity = "1";
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.style.opacity = "0"; }, 3500);
}

function setBtnLoading(id, loading, txt) {

  if (!b) return;
  b.disabled = loading;
  b.innerHTML = loading ? "<span class='spin'></span>" + txt : txt;
}

// ── API ───────────────────────────────────────────────────────
async function apiCall(action, data) {
  try {
    var ctrl = new AbortController();
    var timer = setTimeout(function() { ctrl.abort(); }, 15000);
    var r = await fetch(API, {
      method: "POST",
      headers: {"Content-Type": "text/plain"},
      body: JSON.stringify({action: action, data: data}),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    var json = await r.json();
    return json;
  } catch(e) {
    if (e.name === "AbortError") console.warn("Request timed out:", action);
    else console.warn("API POST failed:", e);
    return null;
  }
}

async function apiGet(action, params) {
  try {
    var ctrl = new AbortController();
    var timer = setTimeout(function() { ctrl.abort(); }, 15000);
    var u = new URL(API);
    u.searchParams.set("action", action);
    if (params) Object.keys(params).forEach(function(k) { u.searchParams.set(k, params[k]); });
    var r = await fetch(u.toString(), {signal: ctrl.signal});
    clearTimeout(timer);
    return await r.json();
  } catch(e) {
    if (e.name === "AbortError") console.warn("Request timed out:", action);
    else console.warn("API GET failed:", e);
    return null;
  }
}

  }
}

async function doSyncSheets() {
  if (syncInProgress) { showToast("Sync already in progress...", "warn"); return; }
  syncInProgress = true;
  setBtnLoading("btn-sync", true, "Syncing...");
  showToast("<span class='spin'></span> Loading from Google Sheets...", "ok");
  var errors = [];
  try {
    // Clear stale cached data before sync
    localStorage.removeItem("ts");
    localStorage.removeItem("tf");
    localStorage.removeItem("te");
    localStorage.removeItem("tq");
    // Reset to seed
    students = JSON.parse(JSON.stringify(SEED.students));
    fees = [];
    exps = JSON.parse(JSON.stringify(SEED.expenses));
    enqs = [];
    // Fetch all 4 in sequence (not parallel) to avoid rate limiting
    var ss = await apiGet("getStudents");
    if (ss && Array.isArray(ss) && ss.length > 0) {
      students = ss.map(function(s) {
        // Normalize fields
        s.fee = Number(s.fee) || 0;
        s.due = Number(s.due) || 0;
        s.phone = String(s.phone || "");
        return s;
      });
      showToast("<span class='spin'></span> Students loaded, getting fees...", "ok");
    } else { errors.push("students"); }

    var ff = await apiGet("getFees");
    if (ff && Array.isArray(ff)) fees = ff;
    else errors.push("fees");

    var ee = await apiGet("getExpenses");
    if (ee && Array.isArray(ee)) {
      // Historical expenses (from Excel, no IDs) + Sheet-tracked expenses
      var historical = SEED.expenses; // already excludes May+ (managed in Sheets)
      exps = historical.concat(ee);
    } else errors.push("expenses");

    var qq = await apiGet("getEnquiries");
    if (qq && Array.isArray(qq)) enqs = qq;
    else errors.push("enquiries");

    sv();
    updBadges();
    render();

    if (errors.length === 0) {
      showToast("&#10003; Synced " + students.length + " students successfully!", "ok");
    } else {
      showToast("&#9888; Partial sync. Failed: " + errors.join(", "), "warn");
    }
  } catch(e) {
    showToast("&#10005; Sync error: " + e.message, "error");
  } finally {
    syncInProgress = false;
    setBtnLoading("btn-sync", false, "&#128260; Sync from Sheets");
  }
}

// ── HELPERS ───────────────────────────────────────────────────
function fmt(n) { return "Rs " + Number(n||0).toLocaleString("en-IN"); }
function tod() { return new Date().toISOString().slice(0,10); }
function isUp(s) {
  if (!s.validTill) return true;
  var vt = String(s.validTill).slice(0,10);
  return vt < tod();
}
function dud(s) {
  if (!s.validTill) return -999;
  var vt = String(s.validTill).slice(0,10);
  return Math.ceil((new Date(vt) - new Date(tod())) / 864e5);
}
function absCnt(sid, ym) {
  var r = (att[ym || attMo] || {})[sid] || {};
  return Object.values(r).filter(function(v) { return v === "A"; }).length;
}
function beltB(b) {
  var c = BC[b] || "#f3f4f6";
  return "<span class='belt' style='background:" + c + "'></span>" + (b || "White");
}
function statB(s) {
  if (isUp(s)) return "<span class='bdg br2'>Overdue</span>";
  var d = dud(s);
  if (d <= 5) return "<span class='bdg ba'>Due in " + d + "d</span>";
  return "<span class='bdg bg'>Paid</span>";
}
function waLink(ph, msg, lbl) {
  if (!ph || ph === "undefined") return "";
  var u = "https://wa.me/91" + String(ph).replace(/\D/g,"") + "?text=" + encodeURIComponent(msg);
  return "<a href='" + u + "' target='_blank' class='wa'>&#128241; " + lbl + "</a>";
}

// ── NOTIFICATIONS ─────────────────────────────────────────────
function getNots() {
  var n = [], ym = tod().slice(0,7);
  students.forEach(function(s) {
    var ab = absCnt(s.id, ym);
    if (ab >= 2 && ab < 5) n.push({t:"a2", s:s, ab:ab});
    else if (ab >= 5) n.push({t:"a5", s:s, ab:ab});
    var d = dud(s);
    if (d >= 0 && d <= 5) n.push({t:"due", s:s, d:d});
  });
  return n;
}

function rDash() {

    return "<div style='padding:60px;text-align:center'><div style='font-size:48px;margin-bottom:16px'>&#129355;</div><div style='font-family:var(--fh);font-size:20px;margin-bottom:8px'>Welcome to Taika Martial Arts Academy</div><div style='font-size:13px;color:var(--gray);margin-bottom:24px'>Click below to load your data from Google Sheets</div><button class='btn btr' onclick='doSyncSheets()'>&#128260; Load Data from Sheets</button></div>";
  }
  var paid = students.filter(function(s){return !isUp(s);}).length;
  var unp = students.filter(function(s){return isUp(s);}).length;
  var tDue = students.filter(function(s){return isUp(s);}).reduce(function(a,s){return a+(Number(s.fee)||0);},0);

  // Live monthly from fee payments + expenses
  var lm = {};
  monthly.forEach(function(m){ lm[m.month]={month:m.month,collected:Number(m.collected)||0,expenses:Number(m.expenses)||0}; });
  fees.forEach(function(p){
    var dt=p.date||""; if(!dt) return;
    try {
      var d=new Date(dt);
      if(isNaN(d)) return;
      var mo=d.toLocaleString("en-IN",{month:"short"})+" "+d.getFullYear();
      if(!lm[mo]) lm[mo]={month:mo,collected:0,expenses:0};
      lm[mo].collected += Number(p.amt||p.amount||0);
    } catch(e){}
  });
  // Only add expenses for months NOT in SEED monthly (new months going forward)
  // SEED monthly is the authoritative source for all historical months
  var seedMonthNames = SEED.monthly.map(function(m){return m.month;});
  exps.forEach(function(e){
    var dt=e.date||""; if(!dt) return;
    try {
      var d=new Date(dt);
      if(isNaN(d)) return;
      var mo=d.toLocaleString("en-IN",{month:"short"})+" "+d.getFullYear();
      // Skip ALL seed months - their expenses are already in lm from SEED.monthly
      if(seedMonthNames.indexOf(mo) !== -1) return;
      if(!lm[mo]) lm[mo]={month:mo,collected:0,expenses:0};
      lm[mo].expenses += Number(e.expense||0);
    } catch(e2){}
  });
  // Dynamic sort by actual date
  var allArr=Object.values(lm).sort(function(a,b){
    var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    function toNum(s){var p=s.split(" ");return parseInt(p[1])*12+months.indexOf(p[0]);}
    return toNum(a.month)-toNum(b.month);
  });
  allArr.forEach(function(m){m.remains=m.collected-m.expenses;});

  // Totals across ALL months for cards
  var totalCol=allArr.reduce(function(a,m){return a+m.collected;},0);
  var totalExp=allArr.reduce(function(a,m){return a+m.expenses;},0);
  var wallet=totalCol-totalExp;

  // Chart shows last 6 months up to and including current month
  var months_=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function mthNum(s){var p=s.split(" ");return parseInt(p[1])*12+months_.indexOf(p[0]);}
  var now_=new Date();
  var nowNum=now_.getFullYear()*12+now_.getMonth(); // 0-based month
  var upToNow=allArr.filter(function(m){
    var p=m.month.split(" ");
    var mNum=parseInt(p[1])*12+months_.indexOf(p[0]);
    return mNum <= nowNum;
  });
  var liveArr=upToNow.slice(-6);
  var maxA=liveArr.length?Math.max.apply(null,liveArr.map(function(m){return Math.max(m.collected||1,m.expenses||1);})):1;
  var dateRange=allArr.length?allArr[0].month+" – "+allArr[allArr.length-1].month:"";

  // Show only last 3 months on dashboard for clarity
  var recentArr = liveArr.slice(-3);
  var mRows=recentArr.map(function(m){
    var wc=Math.round((m.collected||0)/maxA*100);
    var we=Math.round((m.expenses||0)/maxA*100);
    return "<div class='cr' style='margin-bottom:12px'><span class='mo'>"+m.month+"</span><div style='flex:1'>"
      +"<div class='cr' style='margin-bottom:3px'><span style='width:60px;font-size:11px;color:var(--gray)'>Collected</span><div class='bb2' style='flex:1'><div class='bf' style='width:"+wc+"%;background:var(--red)'></div></div><span class='bamt' style='color:var(--red)'>"+fmt(m.collected)+"</span></div>"
      +"<div class='cr'><span style='width:60px;font-size:11px;color:var(--gray)'>Expenses</span><div class='bb2' style='flex:1'><div class='bf' style='width:"+we+"%;background:#94a3b8'></div></div><span class='bamt' style='color:#6b7280'>"+fmt(m.expenses)+"</span></div>"
      +"</div><span class='rem' style='color:"+(m.remains>=0?"#16a34a":"var(--red)")+"'>"+fmt(m.remains)+"</span></div>";
  }).join("");

  // Recently joined - use paidOn as fallback if joinedDate empty
  var rec=students.filter(function(s){return s.joinedDate||s.paidOn;}).sort(function(a,b){
    var da=String(b.joinedDate||b.paidOn||"");
    var db=String(a.joinedDate||a.paidOn||"");
    return da.localeCompare(db);
  }).slice(0,6);
  var rRows=rec.map(function(s){return "<tr><td><b>"+s.name+"</b></td><td>"+beltB(s.belt)+"</td><td>"+String(s.joinedDate||s.paidOn||"").slice(0,10)+"</td><td>"+statB(s)+"</td></tr>";}).join("");

  return "<div class='sg5'>"
    +"<div class='sc'><div class='lb'>Total Students</div><div class='vl'>"+students.length+"</div><div class='sb2'>Active members</div></div>"
    +"<div class='sc gn'><div class='lb'>Fee Paid</div><div class='vl'>"+paid+"</div><div class='sb2'>"+Math.round(paid/students.length*100)+"% of batch</div></div>"
    +"<div class='sc rd'><div class='lb'>Overdue</div><div class='vl'>"+unp+"</div><div class='sb2'>"+fmt(tDue)+" pending</div></div>"
    +"<div class='sc gd'><div class='lb'>Total Collected</div><div class='vl'>"+fmt(totalCol)+"</div><div class='sb2'>"+dateRange+"</div></div>"
    +"<div class='sc' style='border-left:4px solid #16a34a'><div class='lb'>Wallet Balance</div><div class='vl' style='color:#16a34a'>"+fmt(wallet)+"</div><div class='sb2'>After all expenses</div></div>"
    +"</div><div style='display:grid;grid-template-columns:1fr 1fr;gap:18px'>"
    +"<div class='card'><div class='ch'><h3>Monthly P&L</h3></div><div style='padding:16px 18px'><div class='cw'>"+mRows+"</div></div></div>"
    +"<div class='card'><div class='ch'><h3>Recently Joined</h3></div><table class='tbl'><thead><tr><th>Name</th><th>Belt</th><th>Joined</th><th>Status</th></tr></thead><tbody>"+rRows+"</tbody></table></div>"
    +"</div>";
}

function tAtt(sid,day,ym){
  if(!att[ym]) att[ym]={};
  if(!att[ym][sid]) att[ym][sid]={};
  var c=att[ym][sid][day]||"";
  att[ym][sid][day]=c==="P"?"A":c==="A"?"":"P";
  sv(); render(); updBadges();
  var ds=ym+"-"+(day<10?"0":"")+day;
  var st=students.find(function(x){return x.id===sid;});
  if(st && att[ym][sid][day]) apiCall("markAttendance",{records:[{studentId:sid,studentName:st.name,date:ds,month:ym,status:att[ym][sid][day]}]});
}

function markAll(ym){
  if(!att[ym]) att[ym]={};
  var d=parseInt(tod().slice(8)), recs=[];
  students.forEach(function(s){
    if(!att[ym][s.id]) att[ym][s.id]={};
    att[ym][s.id][d]="P";
    var ds=ym+"-"+(d<10?"0":"")+d;
    recs.push({studentId:s.id,studentName:s.name,date:ds,month:ym,status:"P"});
  });
  sv(); render();
  apiCall("markAttendance",{records:recs}).then(function(r){ if(r&&r.ok) showToast("&#10003; Attendance marked for "+recs.length+" students!","ok"); });
}

function markHoliday(ym){
  var reason=prompt("Holiday reason (optional):","Holiday");
  if(reason===null) return;
  apiCall("markHoliday",{date:tod(),reason:reason||"Holiday"});
  showToast("&#127958; Holiday marked for today!","ok");
}

// ── EXPENSES ──────────────────────────────────────────────────
function rExp() {
  var cats={"Rent":0,"Salary":0,"Electricity":0,"Marketing":0,"Housekeeping":0,"Others":0};
  exps.forEach(function(e){
    if(!e.expense) return;
    var d=(e.detail||"").toLowerCase();
    if(d.includes("rent")) cats["Rent"]+=Number(e.expense);
    else if(d.includes("salary")||d.includes("master")) cats["Salary"]+=Number(e.expense);
    else if(d.includes("electr")) cats["Electricity"]+=Number(e.expense);
    else if(d.includes("pamplet")||d.includes("flex")||d.includes("print")||d.includes("marketing")) cats["Marketing"]+=Number(e.expense);
    else if(d.includes("house")||d.includes("clean")) cats["Housekeeping"]+=Number(e.expense);
    else cats["Others"]+=Number(e.expense);
  });
  var tot=Object.values(cats).reduce(function(a,b){return a+b;},0);
  var cc={"Rent":"#C0392B","Salary":"#2563eb","Electricity":"#d97706","Marketing":"#7c3aed","Housekeeping":"#059669","Others":"#6b7280"};
  var cR=Object.entries(cats).map(function(e){
    var k=e[0],v=e[1],p=tot?Math.round(v/tot*100):0;
    return "<div class='cr' style='margin-bottom:8px'><span style='width:90px;font-size:12px;color:var(--gray)'>"+k+"</span><div class='bb2' style='flex:1'><div class='bf' style='width:"+p+"%;background:"+cc[k]+"'></div></div><span style='font-size:12px;font-weight:600;color:"+cc[k]+";width:90px;text-align:right'>"+fmt(v)+"</span></div>";
  }).join("");
  var eR="";
  var show=exps.slice().reverse().slice(0,30);
  for(var i=0;i<show.length;i++){
    var e=show[i];
    eR+="<tr><td>"+String(e.date||"-").slice(0,10)+"</td><td>"+e.detail+"</td><td style='color:#16a34a'>"+(Number(e.credit)>0?fmt(e.credit):"-")+"</td><td style='color:var(--red);font-weight:600'>"+(Number(e.expense)>0?fmt(e.expense):"-")+"</td><td>"+(e.paidBy||"-")+"</td></tr>";
  }
  return "<div style='display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px'>"
    +"<div class='sc gn'><div class='lb'>Total Collected</div><div class='vl'>"+fmt(exps.reduce(function(a,e){return a+Number(e.credit||0);},0)+monthly.reduce(function(a,m){return a+m.collected;},0))+"</div></div>"
    +"<div class='sc rd'><div class='lb'>Total Expenses</div><div class='vl'>"+fmt(tot)+"</div><div class='sb2'>Across all categories</div></div></div>"
    +"<div style='display:grid;grid-template-columns:1fr 1fr;gap:18px'>"
    +"<div class='card'><div class='ch'><h3>Expense Breakdown</h3></div><div style='padding:16px 18px'><div class='cw'>"+cR+"</div></div></div>"
    +"<div class='card'><div class='ch'><h3>Expense Log</h3><button class='btn btr' style='font-size:12px;padding:4px 9px' onclick='openAE()'>+ Add</button></div>"
    +"<div style='max-height:400px;overflow-y:auto'><table class='tbl'><thead><tr><th>Date</th><th>Details</th><th>Credit</th><th>Expense</th><th>By</th></tr></thead><tbody>"+eR+"</tbody></table></div></div></div>";
}

// ── ENQUIRIES ─────────────────────────────────────────────────
function rEnq() {
  var sc={"New":"bb","Contacted":"ba","Joined":"bg","Lost":"br2"};
  var rows="";
  for(var i=0;i<enqs.length;i++){
    var e=enqs[i];
    var opts=["New","Contacted","Joined","Lost"].map(function(s){return "<option"+(s===e.status?" selected":"")+">"+s+"</option>";}).join("");
    rows+="<tr><td><b>"+e.name+"</b></td><td>"+e.phone+"</td><td>"+e.date+"</td><td>"+(e.source||"-")+"</td>"
      +"<td><span class='bdg "+(sc[e.status]||"")+"'>"+e.status+"</span></td>"
      +"<td>"+waLink(e.phone,"Dear "+e.name+",\n\nThank you for your interest in Taika Martial Arts Academy - Gokul Plots!\n\nWe would love to welcome you to our martial arts family. Please visit us at your convenience or call to schedule a free trial class.\n\nWarm regards,\nTaika Martial Arts Academy\n&#128205; Gokul Plots","Invite")
      +" <select onchange='updEnq("+i+",this.value)' style='padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:11px'>"+opts+"</select></td></tr>";
  }
  if(!rows) rows="<tr><td colspan='6' style='text-align:center;color:var(--gray);padding:20px'>No enquiries yet. Add your first lead!</td></tr>";
  var stat=["New","Contacted","Joined","Lost"];
  var cards=stat.map(function(s){return "<div class='sc'><div class='lb'>"+s+"</div><div class='vl'>"+enqs.filter(function(e){return e.status===s;}).length+"</div></div>";}).join("");
  return "<div style='display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px'>"+cards+"</div>"
    +"<div class='card'><div class='ch'><h3>Enquiry Pipeline</h3></div>"
    +"<div style='overflow-x:auto'><table class='tbl'><thead><tr><th>Name</th><th>Phone</th><th>Date</th><th>Source</th><th>Status</th><th>Actions</th></tr></thead><tbody>"+rows+"</tbody></table></div></div>";
}
function updEnq(i,v){ enqs[i].status=v; sv(); render(); apiCall("updateEnquiry",{id:enqs[i].id,status:v}); }

function toggleNP(){
  var nots=getNots(), h="";
  if(!nots.length) h="<p style='color:var(--gray);font-size:13px;padding:12px'>&#127881; No pending notifications</p>";
  nots.forEach(function(n){
    var t="",m="",b="";
    if(n.t==="a2"){
      t="&#9888; Absent Alert — "+n.s.name;
      m=n.s.name+" has been absent "+n.ab+" days this month.";
      b=waLink(n.s.phone,"Dear "+String(n.s.parentName||n.s.name)+",\n\nThis is to inform you that *"+n.s.name+"* has been absent for *"+n.ab+" days* this month at Taika Martial Arts Academy.\n\nRegular attendance is important for progress. Please ensure "+n.s.name+" attends the sessions.\n\nRegards,\nTaika Martial Arts Academy","Send Alert");
    } else if(n.t==="a5"){
      t="&#128680; High Absence — "+n.s.name;
      m=n.s.name+" absent "+n.ab+" days! Immediate attention needed.";
      b=waLink(n.s.phone,"Dear "+String(n.s.parentName||n.s.name)+",\n\nWe are concerned as *"+n.s.name+"* has missed *"+n.ab+" sessions* this month at Taika Martial Arts Academy.\n\nPlease contact us at your earliest convenience so we can understand and assist.\n\nRegards,\nTaika Martial Arts Academy","Send Urgent Alert");
    } else if(n.t==="due"){
      t="&#128176; Fee Due — "+n.s.name;
      m="Membership expires in "+n.d+" day(s). Valid till "+String(n.s.validTill||"").slice(0,10);
      b=waLink(n.s.phone,"Dear "+String(n.s.parentName||n.s.name)+",\n\nThis is a friendly reminder that *"+n.s.name+"*'s membership at Taika Martial Arts Academy is due for renewal in *"+n.d+" day(s)*.\n\nFee: "+fmt(n.s.fee)+" | Plan: "+n.s.plan+"\n\nKindly renew to ensure uninterrupted training.\n\nWarm regards,\nTaika Martial Arts Academy","Send Reminder");
    }
    h+="<div class='nit'><div class='nt'>"+t+"</div><div class='nm'>"+m+"</div>"+b+"</div>";
  });
  document.getElementById("npl").innerHTML=h;
  document.getElementById("np").classList.toggle("open");
}

// ── MODALS ────────────────────────────────────────────────────
function openAS(){ document.getElementById("ms").classList.add("open"); }
function closeM(id){ document.getElementById(id).classList.remove("open"); }

function saveS(){
  var name=document.getElementById("fn").value.trim();
  var phone=document.getElementById("fph").value.trim();
  if(!name||!phone){ alert("Student name and phone number are required."); return; }
  var fee=parseInt(document.getElementById("ff2").value)||0;
  var parent=document.getElementById("fp2").value.trim();
  var s={id:"S"+String(students.length+1).padStart(3,"0"),name:name,phone:phone,
    plan:document.getElementById("fpl").value,fee:fee,belt:document.getElementById("fb").value,
    parentName:parent,joinedDate:document.getElementById("fj").value,
    paidOn:"",validTill:"",status:"Unpaid",due:fee};
  students.push(s); sv(); closeM("ms"); updBadges(); render();
  apiCall("addStudent",s).then(function(r){ if(r&&r.ok) showToast("&#10003; "+name+" added to Google Sheets!","ok"); });
  var pname=parent||name;
  var msg="Dear "+pname+",\n\n*Welcome to Taika Martial Arts Academy - Gokul Plots!* &#129355;\n\nWe are delighted to welcome *"+name+"* to our martial arts family!\n\n*Membership Details:*\n&#128100; Student: "+name+"\n&#127955; Belt: "+s.belt+"\n&#128197; Joined: "+s.joinedDate+"\n&#128176; Plan: "+s.plan+"\n\nWe look forward to "+name+"'s journey in martial arts with us.\n\nFor any queries, feel free to reach out.\n\nWarm regards,\nTaika Martial Arts Academy\n&#128205; Gokul Plots";
  if(confirm("Student added! Send WhatsApp welcome message to "+phone+"?")) window.open("https://wa.me/91"+phone.replace(/\D/g,"")+"?text="+encodeURIComponent(msg),"_blank");
}

function openFee(sid){
  var s=sid?students.find(function(x){return x.id===sid;}):null;
  curFS=s;
  document.getElementById("fpn").value=s?s.name:"";
  document.getElementById("fpa").value=s?s.fee:"";
  document.getElementById("fpp").value=s?s.plan:"1 Month";
  document.getElementById("fpd").value=tod();
  calcVT();
  document.getElementById("mf").classList.add("open");
}
function calcVT(){
  var pl=document.getElementById("fpp").value, dt=document.getElementById("fpd").value;
  if(!dt) return;
  var mo={"1 Month":1,"3 Months":3,"6 Months":6,"12 Months":12}[pl]||1;
  var d=new Date(dt); d.setMonth(d.getMonth()+mo);
  document.getElementById("fpv").value=d.toISOString().slice(0,10);
}
document.getElementById("fpp").addEventListener("change",calcVT);
document.getElementById("fpd").addEventListener("change",calcVT);

function saveF(){
  var amt=parseInt(document.getElementById("fpa").value);
  var dt=document.getElementById("fpd").value;
  if(!amt||!dt){ alert("Payment amount and date are required."); return; }
  var pl=document.getElementById("fpp").value, vt=document.getElementById("fpv").value;
  var rec={id:"P"+Date.now(),sid:curFS?curFS.id:"",amt:amt,amount:amt,date:dt,plan:pl,valid:vt,validTill:vt};
  fees.push(rec);
  if(curFS){
    var idx=students.findIndex(function(s){return s.id===curFS.id;});
    if(idx>=0){students[idx].paidOn=dt;students[idx].validTill=vt;students[idx].status="Paid";students[idx].plan=pl;students[idx].due=0;}
  }
  sv(); closeM("mf"); updBadges(); render();
  if(curFS){
    apiCall("addFeePayment",{studentId:curFS.id,studentName:curFS.name,amount:amt,date:dt,plan:pl,validTill:vt}).then(function(r){if(r&&r.ok) showToast("&#10003; Payment saved to Google Sheets!","ok");});
    var pname=String(curFS.parentName||curFS.name);
    var msg="Dear "+pname+",\n\n*Payment Receipt*\n*Taika Martial Arts Academy - Gokul Plots*\n\n&#9989; Payment received successfully!\n\n*Details:*\n&#128100; Student: "+curFS.name+"\n&#128176; Amount: *"+fmt(amt)+"*\n&#128197; Date: "+dt+"\n&#128203; Plan: "+pl+"\n&#9200; Valid Till: *"+vt+"*\n\nThank you for your timely payment!\n\nWarm regards,\nTaika Martial Arts Academy\n&#128205; Gokul Plots";
    if(confirm("Payment saved! Send WhatsApp receipt to "+curFS.phone+"?")) window.open("https://wa.me/91"+String(curFS.phone).replace(/\D/g,"")+"?text="+encodeURIComponent(msg),"_blank");
  }
}

function openAE(){
  var det=prompt("Expense description:"); if(!det) return;
  var amt=parseFloat(prompt("Amount (Rs):")); if(!amt||isNaN(amt)) return;
  var by=prompt("Paid by (e.g. Dinesh / Nanditha):");
  var e={date:tod(),detail:det,expense:amt,credit:0,paidBy:by||""};
  exps.unshift(e); sv(); render();
  apiCall("addExpense",e).then(function(r){if(r&&r.ok) showToast("&#10003; Expense saved to Sheets!","ok");});
}

function openAQ(){
  var name=prompt("Enquiry - Full Name:"); if(!name) return;
  var phone=prompt("Mobile Number:"); if(!phone) return;
  var src=prompt("Source (Referral / Pamphlet / Social Media / Walk-in):");
  var q={name:name,phone:phone,date:tod(),source:src||"Walk-in",status:"New"};
  enqs.push(q); sv(); render();
  apiCall("addEnquiry",q).then(function(r){if(r&&r.ok) showToast("&#10003; Enquiry added to Sheets!","ok");});
}

function toggleSB(){ document.getElementById("sb").classList.toggle("open"); document.getElementById("ov").classList.toggle("show"); }
function closeSB(){ document.getElementById("sb").classList.remove("open"); document.getElementById("ov").classList.remove("show"); }

// ── AUTO INIT ─────────────────────────────────────────────────
(async function(){
  updBadges();
  render();
  try {
    var r = await apiGet("ping");
    if(r && r.ok){
      document.getElementById("conn-status").innerHTML = "&#9679; Connected &#10003;";
      document.getElementById("conn-status").style.color = "#4ade80";
      showToast("&#10003; Connected to Google Sheets!","ok");
      // Auto-sync only if local data is from seed (no user data yet)
      if(!localStorage.getItem("ts")) await doSyncSheets();
    }
  } catch(e){ console.log("Auto-connect:", e.message); }
})();
</script>
